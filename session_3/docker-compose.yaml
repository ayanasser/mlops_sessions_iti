# docker-compose.yaml — Blue/Green + canary demo
# nginx fronts two versions of the API; shift traffic by editing nginx.conf.
services:
  nginx:
    image: nginx:alpine
    ports:
      - "8000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - blue
      - green

  blue:   # current production model
    image: yourusername/ride-api:v1.2.0
    environment:
      - MODEL_VERSION=v1.2.0
    expose:
      - "8000"

  green:  # new candidate model
    image: yourusername/ride-api:v1.3.0
    environment:
      - MODEL_VERSION=v1.3.0
    expose:
      - "8000"
