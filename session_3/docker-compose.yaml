# ─────────────────────────────────────────────────────────────────────────────
# Airflow 3.3.0 — local development stack (LocalExecutor)
#
# Trimmed down from the official CeleryExecutor compose: we use LocalExecutor,
# so there is NO redis / celery-worker / flower. Tasks run as subprocesses of
# the scheduler — plenty for a single-machine demo.
#
# Services:
#   postgres              — Airflow metadata DB
#   airflow-init          — one-shot: db migrate + create admin user
#   airflow-apiserver     — web UI + REST/execution API (Airflow 3 renamed the
#                           old "webserver" to "api-server")  → http://localhost:8080
#   airflow-scheduler     — schedules & runs tasks (LocalExecutor)
#   airflow-dag-processor — parses DAG files (a standalone component in Airflow 3)
#   airflow-triggerer     — runs deferred/async tasks
#
# Quick start:
#   docker compose build
#   docker compose up -d
#   open http://localhost:8080   (login: airflow / airflow)
# ─────────────────────────────────────────────────────────────────────────────
---
x-airflow-common:
  &airflow-common
  # Build our extended image (Airflow + DAG runtime deps) from ./Dockerfile.
  build: .
  image: ${AIRFLOW_IMAGE_NAME:-mlops-airflow:3.3.0}
  env_file:
    - .env
  environment:
    &airflow-common-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__AUTH_MANAGER: airflow.providers.fab.auth_manager.fab_auth_manager.FabAuthManager
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__FERNET_KEY: ${FERNET_KEY}
    AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
    # Keep the UI clean: show ONLY our DAGs, not the ~50 bundled examples.
    AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
    AIRFLOW__CORE__EXECUTION_API_SERVER_URL: 'http://airflow-apiserver:8080/execution/'
    AIRFLOW__API_AUTH__JWT_SECRET: ${AIRFLOW__API_AUTH__JWT_SECRET:-airflow_jwt_secret}
    AIRFLOW__SCHEDULER__ENABLE_HEALTH_CHECK: 'true'
    # GCP service-account key (mounted read-only below). google.cloud.storage
    # picks this up as Application Default Credentials — without it, the extract
    # task dies with DefaultCredentialsError.
    GOOGLE_APPLICATION_CREDENTIALS: /opt/airflow/gcp-key.json
  volumes:
    # The DAGs folder we already have (note the capital D) → Airflow's dags dir.
    - ./Dags:/opt/airflow/dags
    # Service-account key — read-only, and git-ignored on the host.
    - ./gcp-key.json:/opt/airflow/gcp-key.json:ro
    # Supporting code + config + data the tasks reach for at run time.
    - ./src:/opt/airflow/src
    - ./config:/opt/airflow/config
    - ./data:/opt/airflow/data
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
  user: "${AIRFLOW_UID:-50000}:0"
  depends_on:
    &airflow-common-depends-on
    postgres:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres-db-volume:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      retries: 5
      start_period: 5s
    restart: always

  airflow-apiserver:
    <<: *airflow-common
    command: api-server
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/api/v2/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type SchedulerJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-dag-processor:
    <<: *airflow-common
    command: dag-processor
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type DagProcessorJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-triggerer:
    <<: *airflow-common
    command: triggerer
    healthcheck:
      test: ["CMD-SHELL", 'airflow jobs check --job-type TriggererJob --hostname "$${HOSTNAME}"']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: always
    depends_on:
      <<: *airflow-common-depends-on
      airflow-init:
        condition: service_completed_successfully

  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - |
        mkdir -p /opt/airflow/{logs,dags,plugins,config,src,data}
        echo "Airflow version:"
        /entrypoint airflow version
        chown -R "${AIRFLOW_UID:-50000}:0" /opt/airflow/{logs,dags,plugins,config,src,data} || true
    environment:
      <<: *airflow-common-env
      _AIRFLOW_DB_MIGRATE: 'true'
      _AIRFLOW_WWW_USER_CREATE: 'true'
      _AIRFLOW_WWW_USER_USERNAME: ${_AIRFLOW_WWW_USER_USERNAME:-airflow}
      _AIRFLOW_WWW_USER_PASSWORD: ${_AIRFLOW_WWW_USER_PASSWORD:-airflow}
    user: "0:0"

  # `docker compose --profile debug run airflow-cli <cmd>` for one-off CLI calls.
  airflow-cli:
    <<: *airflow-common
    profiles:
      - debug
    command:
      - bash
      - -c
      - airflow

volumes:
  postgres-db-volume:
