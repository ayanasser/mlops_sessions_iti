# nginx.conf — traffic routing for the Blue/Green + canary demo.
# Mounted read-only into the nginx container at /etc/nginx/nginx.conf.
# After editing, reload with zero downtime:  docker compose exec nginx nginx -s reload
events {}

http {
    # ── Blue/Green: 100% to blue (flip to green to release) ────────────
    upstream backend {
        server blue:8000;    # comment out to switch to green
        # server green:8000;
    }

    # ── Canary alternative: weighted routing ──────────────────────────
    # Replace the block above with this to send a slice of traffic to green.
    # upstream backend {
    #     server blue:8000  weight=95;   # 95% to production
    #     server green:8000 weight=5;    # 5% canary traffic
    # }
    #
    # Canary rollout stages — edit weights, then reload nginx:
    #   Stage 1:  weight=95 / weight=5   →  watch for 30 min
    #   Stage 2:  weight=80 / weight=20  →  watch for 1 hour
    #   Stage 3:  weight=50 / weight=50  →  watch for 2 hours
    #   Stage 4:  weight=0  / weight=100 →  fully rolled out

    server {
        listen 80;

        location / {
            proxy_pass http://backend;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
