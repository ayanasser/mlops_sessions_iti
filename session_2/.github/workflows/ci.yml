# .github/workflows/ci-cd.yml
name: CI / CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: ride-duration/ride-api
  PYTHON_VERSION: "3.11"

# ══════════════════════════════════════════════════════════════
# JOB 1 — Lint & Test (runs on every push + every PR)
# ══════════════════════════════════════════════════════════════
jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false        # if 3.10 fails, let 3.11 and 3.12 still run

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Lint with Ruff
        run: ruff check src/ tests/

      - name: Format check with Ruff
        run: ruff format --check src/ tests/

      - name: Run tests with coverage
        run: pytest --cov=src --cov-report=xml --cov-fail-under=80 -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'    # upload once, not 3 times
        with:
          files: ./coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

# ══════════════════════════════════════════════════════════════
# JOB 2 — Build & Push Docker image to ECR
#          only on main branch, only if tests passed
# ══════════════════════════════════════════════════════════════
  build-and-push:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
      registry:  ${{ steps.login-ecr.outputs.registry }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=sha,prefix=,format=short      # e.g.  a3f8bc1
            type=raw,value=latest              # always tag :latest on main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
          cache-to:   type=inline              # store cache inside the image layers

# ══════════════════════════════════════════════════════════════
# JOB 3 — Deploy to EC2
#          only after image is pushed, requires manual approval
# ══════════════════════════════════════════════════════════════
  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: production                    # requires manual approval in GitHub UI

    steps:
      - name: Deploy new image to EC2 via SSH
        env:
          IMAGE: ${{ needs.build-and-push.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ needs.build-and-push.outputs.image-tag }}
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > /tmp/key.pem
          chmod 600 /tmp/key.pem

          ssh -i /tmp/key.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ secrets.EC2_HOST }} << EOF
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin \
                ${{ needs.build-and-push.outputs.registry }}

            docker pull $IMAGE

            docker stop ride-api 2>/dev/null || true
            docker rm   ride-api 2>/dev/null || true

            docker run -d \
              --name ride-api \
              --restart unless-stopped \
              -p 8000:8000 \
              -e MODEL_PATH=/models/v1/model.pkl \
              -e LOG_LEVEL=INFO \
              $IMAGE
          EOF

      - name: Smoke test — health check
        run: |
          sleep 15
          curl --fail --retry 3 --retry-delay 5 \
            http://${{ secrets.EC2_HOST }}:8000/health \
            | jq '.status'