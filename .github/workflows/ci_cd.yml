name: CI / CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/ride-api

# This workflow lives at the REPO ROOT (mlops_sessions/.github/workflows), but the
# project it builds is in the session_2/ subdirectory. `defaults.run.working-directory`
# makes every `run:` step execute inside session_2/ — so `pip install`, `ruff`, and
# `pytest` find pyproject.toml/src/tests without any `cd`.
# NOTE: this only affects `run:` steps. Action inputs (`uses:` steps like cache,
# codecov, docker build) are ALWAYS relative to the repo root, so those paths are
# written as `session_2/...` explicitly below.
defaults:
  run:
    working-directory: session_2

# ═════════════════════════════════════════════════════════════════════════════
# JOB 1 — Lint & Test
# Runs on every push and every PR, across three Python versions in parallel.
# ═════════════════════════════════════════════════════════════════════════════
jobs:
  lint-and-test:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('session_2/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install dependencies
        run: pip install -e .[dev]

      - name: Lint with Ruff
        run: ruff check src/ tests/

      - name: Format check with Ruff
        run: ruff format --check src/ tests/

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=50 \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          files: session_2/coverage.xml    # produced in session_2/ by pytest; codecov paths are repo-root relative
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

# ═════════════════════════════════════════════════════════════════════════════
# JOB 2 — Build & Push to Docker Hub
# Only runs on main branch, only if all lint-and-test jobs passed.
# ═════════════════════════════════════════════════════════════════════════════
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_IMAGE }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: session_2          # the Dockerfile + app live in session_2/
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.DOCKERHUB_IMAGE }}:latest
          cache-to: type=inline
